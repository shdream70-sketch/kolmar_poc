# Premium EP1 배포: Kudu /api/publish?type=zip
# ODBC Driver 18: Debian 11(Bullseye)용 패키지에서 .so 추출하여 번들
# Premium EP1 전환 (2026-03-28): Cold Start 제거 + Always-ON

name: Build and deploy Python project to Azure Function App - kgr-powerbi-prd-apim2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  FUNCTIONAPP_NAME: 'kgr-powerbi-prd-apim2'
  RESOURCE_GROUP: 'KOLMAR-BI'
  KUDU_URL: 'https://kgr-powerbi-prd-apim2-gzf8fcg9cef6fder.scm.koreacentral-01.azurewebsites.net'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Bundle ODBC Driver 18 (Debian 11 Bullseye)
        run: |
          # Debian 11(Bullseye)용 ODBC Driver 18 패키지 다운로드 및 .so 추출
          # 런타임 컨테이너가 Debian 11이므로 반드시 Bullseye용 패키지 사용
          mkdir -p /tmp/odbc_extract .odbc_driver/lib

          # MS 패키지 저장소에서 Debian 11용 msodbcsql18 다운로드
          curl -fsSL "https://packages.microsoft.com/debian/11/prod/pool/main/m/msodbcsql18/" -o /tmp/odbc_index.html
          DEB_FILE=$(grep -oP 'msodbcsql18_18\.[^"]+_amd64\.deb' /tmp/odbc_index.html | sort -V | tail -1)
          echo "Downloading: $DEB_FILE"
          curl -fsSL "https://packages.microsoft.com/debian/11/prod/pool/main/m/msodbcsql18/${DEB_FILE}" -o /tmp/msodbcsql18.deb

          # .deb에서 .so 파일 추출
          cd /tmp/odbc_extract
          ar x /tmp/msodbcsql18.deb
          tar xf data.tar.* 2>/dev/null || tar xzf data.tar.* 2>/dev/null
          cd -

          # .so 파일 복사
          cp /tmp/odbc_extract/opt/microsoft/msodbcsql18/lib64/libmsodbcsql-18*.so.* .odbc_driver/lib/
          SO_FILE=$(ls .odbc_driver/lib/libmsodbcsql-18*.so.* | head -1 | xargs basename)
          echo "Bundled: $SO_FILE"

          # 의존 라이브러리도 번들 (libltdl)
          cp /usr/lib/x86_64-linux-gnu/libltdl.so.7* .odbc_driver/lib/ 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libodbc*.so* .odbc_driver/lib/ 2>/dev/null || true

          # odbcinst.ini 생성
          cat > .odbc_driver/odbcinst.ini <<ODBCEOF
          [ODBC Driver 18 for SQL Server]
          Description=Microsoft ODBC Driver 18 for SQL Server
          Driver=/home/site/wwwroot/.odbc_driver/lib/${SO_FILE}
          UsageCount=1
          ODBCEOF

          echo "=== odbcinst.ini ==="
          cat .odbc_driver/odbcinst.ini
          echo "=== Bundled files ==="
          ls -la .odbc_driver/lib/

      - name: Install Python dependencies
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          zip -r deployment.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "local.settings.json"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Function App via Kudu
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            TOKEN=$(az account get-access-token --resource "https://management.azure.com/" --query "accessToken" -o tsv)
            curl -X POST \
              "${{ env.KUDU_URL }}/api/publish?type=zip" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/zip" \
              --data-binary @deployment.zip \
              --fail \
              --show-error
