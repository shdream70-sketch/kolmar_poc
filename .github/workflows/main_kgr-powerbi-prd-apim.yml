# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# Private Endpoint 환경: Blob Storage 경유 배포 방식 적용
# WEBSITE_RUN_FROM_PACKAGE 로 Function App이 내부에서 패키지를 당겨가는 방식

name: Build and deploy Python project to Azure Function App - kgr-powerbi-prd-apim

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.10'
  STORAGE_ACCOUNT_NAME: 'kolmarbistr'        # Function App 연결 Storage
  BLOB_CONTAINER_NAME: 'deployments'         # 배포용 컨테이너 (없으면 자동 생성)
  PACKAGE_NAME: 'kgr-powerbi-prd-apim.zip'  # 배포 패키지 파일명

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          zip -r ${{ env.PACKAGE_NAME }} . \
            --exclude "*.git*" \
            --exclude "venv/*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "local.settings.json" \
            --exclude "deploy.zip"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FB9147FFC5FD4210B910CF3E5BF22ED4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B5F1A1FE16849C0AAD9784418CC8BDE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D49A98D44D5A4D4CACC6BB70A14E0249 }}

      - name: Create Blob container if not exists
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage container create \
              --name ${{ env.BLOB_CONTAINER_NAME }} \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --auth-mode login \
              --public-access off \
              || true

      - name: Upload package to Blob Storage
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --container-name ${{ env.BLOB_CONTAINER_NAME }} \
              --name ${{ env.PACKAGE_NAME }} \
              --file ${{ env.PACKAGE_NAME }} \
              --auth-mode login \
              --overwrite true

      - name: Generate SAS URL for package
        uses: azure/CLI@v2
        id: sas
        with:
          azcliversion: latest
          inlineScript: |
            EXPIRY=$(date -u -d "2 hours" '+%Y-%m-%dT%H:%MZ')
            SAS_URL=$(az storage blob generate-sas \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --container-name ${{ env.BLOB_CONTAINER_NAME }} \
              --name ${{ env.PACKAGE_NAME }} \
              --permissions r \
              --expiry $EXPIRY \
              --auth-mode login \
              --as-user \
              --full-uri \
              --output tsv)
            echo "sas_url=$SAS_URL" >> $GITHUB_OUTPUT

      - name: Set WEBSITE_RUN_FROM_PACKAGE
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az functionapp config appsettings set \
              --name kgr-powerbi-prd-apim \
              --resource-group KOLMAR-BI \
              --settings WEBSITE_RUN_FROM_PACKAGE="${{ steps.sas.outputs.sas_url }}"

      - name: Restart Function App to apply new package
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az functionapp restart \
              --name kgr-powerbi-prd-apim \
              --resource-group KOLMAR-BI