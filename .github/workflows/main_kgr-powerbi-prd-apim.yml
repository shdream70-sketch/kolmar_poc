# Flex Consumption 배포 방식: Kudu /api/publish?type=zip
# Ubuntu에서 빌드한 zip을 Azure AD Bearer 토큰으로 Kudu에 직접 업로드
# 이유: WEBSITE_RUN_FROM_PACKAGE 방식은 zip 내 파일 권한이 0으로 설정되어
#       Linux 컨테이너에서 /home/site/wwwroot 파일을 읽지 못하는 문제 발생

name: Build and deploy Python project to Azure Function App - kgr-powerbi-prd-apim

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  FUNCTIONAPP_NAME: 'kgr-powerbi-prd-apim'
  RESOURCE_GROUP: 'KOLMAR-BI'
  KUDU_URL: 'https://kgr-powerbi-prd-apim-ephqhvf6g6erchbt.scm.koreacentral-01.azurewebsites.net'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Install Python dependencies
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          zip -r deployment.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "local.settings.json"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Function App via Kudu
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            TOKEN=$(az account get-access-token --resource "https://management.azure.com/" --query "accessToken" -o tsv)
            curl -X POST \
              "${{ env.KUDU_URL }}/api/publish?type=zip" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/zip" \
              --data-binary @deployment.zip \
              --fail \
              --show-error
