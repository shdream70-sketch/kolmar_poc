# Premium EP1 배포 방식: Kudu /api/publish?type=zip
# Ubuntu에서 빌드한 zip을 Azure AD Bearer 토큰으로 Kudu에 직접 업로드
# Premium EP1 전환 (2026-03-28): Cold Start 제거 + Always-ON
# ODBC Driver 18: startup.sh로 런타임 설치 (Debian 11)

name: Build and deploy Python project to Azure Function App - kgr-powerbi-prd-apim2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  FUNCTIONAPP_NAME: 'kgr-powerbi-prd-apim2'
  RESOURCE_GROUP: 'KOLMAR-BI'
  KUDU_URL: 'https://kgr-powerbi-prd-apim2-gzf8fcg9cef6fder.scm.koreacentral-01.azurewebsites.net'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Install Python dependencies
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          zip -r deployment.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "local.settings.json"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Function App via Kudu
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            TOKEN=$(az account get-access-token --resource "https://management.azure.com/" --query "accessToken" -o tsv)
            curl -X POST \
              "${{ env.KUDU_URL }}/api/publish?type=zip" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/zip" \
              --data-binary @deployment.zip \
              --fail \
              --show-error
