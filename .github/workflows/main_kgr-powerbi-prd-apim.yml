# Premium EP1 배포 방식: Kudu /api/publish?type=zip
# Ubuntu에서 빌드한 zip을 Azure AD Bearer 토큰으로 Kudu에 직접 업로드
# Premium EP1으로 전환 (2026-03-28): Cold Start 제거 + Always-ON
# ODBC Driver 18을 zip에 포함 (Premium Linux 이미지에 미포함)

name: Build and deploy Python project to Azure Function App - kgr-powerbi-prd-apim2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  FUNCTIONAPP_NAME: 'kgr-powerbi-prd-apim2'
  RESOURCE_GROUP: 'KOLMAR-BI'
  KUDU_URL: 'https://kgr-powerbi-prd-apim2-gzf8fcg9cef6fder.scm.koreacentral-01.azurewebsites.net'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies + ODBC Driver 18
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev
          # ODBC Driver 18 설치 (빌드 환경 + zip 포함용)
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/$(lsb_release -rs)/prod $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Bundle ODBC Driver into deployment
        run: |
          # ODBC Driver .so 파일과 설정을 배포 패키지에 포함
          mkdir -p .odbc_driver/lib
          cp /opt/microsoft/msodbcsql18/lib64/libmsodbcsql-18*.so.* .odbc_driver/lib/
          # odbcinst.ini 생성 (런타임에서 드라이버 검색용)
          cat > .odbc_driver/odbcinst.ini <<'ODBCEOF'
          [ODBC Driver 18 for SQL Server]
          Description=Microsoft ODBC Driver 18 for SQL Server
          Driver=/home/site/wwwroot/.odbc_driver/lib/libmsodbcsql-18.4.1.1.so
          UsageCount=1
          ODBCEOF
          # 실제 .so 파일명으로 경로 업데이트
          SO_FILE=$(ls .odbc_driver/lib/libmsodbcsql-18*.so.* | head -1 | xargs basename)
          sed -i "s|libmsodbcsql-18.4.1.1.so|${SO_FILE}|g" .odbc_driver/odbcinst.ini
          echo "Bundled ODBC driver: ${SO_FILE}"
          cat .odbc_driver/odbcinst.ini

      - name: Install Python dependencies
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          zip -r deployment.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "local.settings.json"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Function App via Kudu
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            TOKEN=$(az account get-access-token --resource "https://management.azure.com/" --query "accessToken" -o tsv)
            curl -X POST \
              "${{ env.KUDU_URL }}/api/publish?type=zip" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/zip" \
              --data-binary @deployment.zip \
              --fail \
              --show-error
